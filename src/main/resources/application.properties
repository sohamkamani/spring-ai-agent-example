spring.application.name=demo

# ============================================
# Server Configuration (from application.yaml)
# ============================================
server.port=8080
server.compression.enabled=true

# ============================================
# AI Model Configuration
# ============================================

# --- OpenRouter Configuration (Primary - uses OpenAI-compatible API) ---
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.chat.options.model=openai/gpt-4o-mini

# --- Alternative: OpenAI Configuration (from application.yaml) ---
# Uncomment below and comment out OpenRouter config above to use OpenAI directly
# spring.ai.openai.base-url=https://api.openai.com
# spring.ai.openai.api-key=${OPENAI_API_KEY}
# spring.ai.openai.chat.options.model=gpt-4o
# spring.ai.openai.chat.options.temperature=0.7

# --- Alternative: Ollama Configuration (from application-dev.yaml) ---
# Uncomment below and disable OpenAI starter to use local Ollama
# spring.ai.ollama.base-url=http://localhost:11434
# spring.ai.ollama.chat.options.model=llama3

# Disable Ollama auto-configuration to avoid bean conflicts when using OpenAI/OpenRouter
spring.ai.ollama.chat.enabled=false
spring.ai.ollama.embedding.enabled=false
